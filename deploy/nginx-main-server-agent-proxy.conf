# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name upwaveai.com www.upwaveai.com;

    # 重定向所有 HTTP 请求到 HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS 配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name upwaveai.com www.upwaveai.com;

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/upwaveai.com.pem;
    ssl_certificate_key /etc/nginx/ssl/upwaveai.com.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # ==================== TikTok Agent 反向代理 ====================
    # 静态资源（优先级最高）
    location /agent/static/ {
        rewrite ^/agent/static/(.*) /static/$1 break;
        proxy_pass http://111.228.61.201:8001;

        proxy_set_header Host $host;

        # 静态资源缓存
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public";
    }

    # WebSocket 连接（必须在其他 location 之前）
    location /agent/ws/ {
        rewrite ^/agent/ws/(.*) /ws/$1 break;
        proxy_pass http://111.228.61.201:8001;

        proxy_http_version 1.1;

        # WebSocket 必需
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时（保持连接）
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # 禁用缓冲
        proxy_buffering off;
    }

    # API 端点
    location /agent/api/ {
        rewrite ^/agent/api/(.*) /api/$1 break;
        proxy_pass http://111.228.61.201:8001;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API 超时
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 输出文件访问
    location /agent/output/ {
        rewrite ^/agent/output/(.*) /output/$1 break;
        proxy_pass http://111.228.61.201:8001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # Agent 主应用（前端页面）
    location /agent/ {
        rewrite ^/agent/(.*) /$1 break;
        proxy_pass http://111.228.61.201:8001;

        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 禁用缓冲（流式响应）
        proxy_buffering off;
    }

    # Agent 精确匹配（处理 /agent 不带斜杠的情况）
    location = /agent {
        return 301 /agent/;
    }
    # ==================== Agent 反向代理结束 ====================

    # 网站根目录
    root /var/www/Upwave-website/dist;
    index index.html;

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 原有 API 代理（保持不变）
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
