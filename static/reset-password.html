<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.png" type="image/png">
    <title>重置密码 - TikTok 达人推荐系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .reset-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .required {
            color: #ef4444;
        }

        input[type="tel"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        input[type="tel"]:focus,
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input:invalid:not(:focus):not(:placeholder-shown) {
            border-color: #ef4444;
        }

        input:valid:not(:focus):not(:placeholder-shown) {
            border-color: #10b981;
        }

        .input-hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .sms-code-group {
            display: flex;
            gap: 10px;
        }

        .sms-code-group input {
            flex: 1;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            background: #5568d3;
        }

        .btn-secondary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #9ca3af;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .links {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-text {
            display: inline-block;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6b7280;
            user-select: none;
            font-size: 18px;
        }

        .password-toggle-icon:hover {
            color: #374151;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: #e5e7eb;
            margin-bottom: 4px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .strength-weak .strength-fill {
            width: 33%;
            background: #ef4444;
        }

        .strength-medium .strength-fill {
            width: 66%;
            background: #f59e0b;
        }

        .strength-strong .strength-fill {
            width: 100%;
            background: #10b981;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <div class="logo">
            <h1>🔒 重置密码</h1>
            <p>通过手机号重置您的账户密码</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="phoneNumber">手机号 <span class="required">*</span></label>
                <input type="tel" id="phoneNumber" name="phoneNumber" required pattern="^1[3-9]\d{9}$"
                    placeholder="请输入11位手机号">
                <div class="input-hint">请输入注册时使用的手机号</div>
            </div>

            <div class="form-group">
                <label for="smsCode">短信验证码 <span class="required">*</span></label>
                <div class="sms-code-group">
                    <input type="text" id="smsCode" name="smsCode" required pattern="\d{6}" placeholder="请输入6位验证码"
                        maxlength="6">
                    <button type="button" id="sendSmsBtn" class="btn-secondary">
                        获取验证码
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="newPassword">新密码 <span class="required">*</span></label>
                <div class="password-toggle">
                    <input type="password" id="newPassword" name="newPassword" required minlength="8"
                        placeholder="至少8位，包含字母和数字">
                    <span class="password-toggle-icon" onclick="togglePassword('newPassword')">👁️</span>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill"></div>
                    </div>
                    <span id="strengthText" class="input-hint">请输入至少8位密码</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码 <span class="required">*</span></label>
                <div class="password-toggle">
                    <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8"
                        placeholder="请再次输入新密码">
                    <span class="password-toggle-icon" onclick="togglePassword('confirmPassword')">👁️</span>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="resetBtn">
                <span class="btn-text">重置密码</span>
                <div class="loading-spinner"></div>
            </button>
        </form>

        <div class="links">
            <a href="/login.html">返回登录</a> | <a href="/register.html">注册新账号</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        let smsCountdown = 0;
        const sendSmsBtn = document.getElementById('sendSmsBtn');

        // 密码显示/隐藏切换
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const icon = passwordInput.nextElementSibling;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                icon.textContent = '👁️';
            }
        }

        // 显示提示信息
        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 3000);
            }
        }

        // 设置加载状态
        function setLoading(isLoading) {
            const btn = document.getElementById('resetBtn');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.loading-spinner');

            if (isLoading) {
                btn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                btnText.style.display = 'inline-block';
                spinner.style.display = 'none';
            }
        }

        // 更新短信按钮状态
        function updateSmsButton() {
            if (smsCountdown > 0) {
                sendSmsBtn.textContent = `${smsCountdown}秒后重试`;
                sendSmsBtn.disabled = true;
            } else {
                sendSmsBtn.textContent = '获取验证码';
                sendSmsBtn.disabled = false;
            }
        }

        // 密码强度检测
        function checkPasswordStrength(password) {
            const strengthBar = document.querySelector('.password-strength');
            const strengthText = document.getElementById('strengthText');

            if (password.length < 8) {
                strengthBar.className = 'password-strength';
                strengthText.textContent = '密码长度至少8位';
                return 'weak';
            }

            let strength = 0;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;

            if (strength <= 1) {
                strengthBar.className = 'password-strength strength-weak';
                strengthText.textContent = '密码强度：弱';
                return 'weak';
            } else if (strength <= 2) {
                strengthBar.className = 'password-strength strength-medium';
                strengthText.textContent = '密码强度：中等';
                return 'medium';
            } else {
                strengthBar.className = 'password-strength strength-strong';
                strengthText.textContent = '密码强度：强';
                return 'strong';
            }
        }

        // 监听密码输入
        document.getElementById('newPassword').addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });

        // 发送短信验证码
        sendSmsBtn.addEventListener('click', async function () {
            const phone = document.getElementById('phoneNumber').value.trim();

            // 验证手机号格式
            const phonePattern = /^1[3-9]\d{9}$/;
            if (!phonePattern.test(phone)) {
                showAlert('请输入正确的11位手机号', 'error');
                document.getElementById('phoneNumber').focus();
                return;
            }

            // 禁用按钮
            sendSmsBtn.disabled = true;
            const originalText = sendSmsBtn.textContent;
            sendSmsBtn.textContent = '发送中...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/send-sms-code`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone_number: phone,
                        code_type: 'reset_password'
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '验证码发送失败');
                }

                showAlert(data.message || '验证码已发送', 'success');

                // 开始60秒倒计时
                smsCountdown = 60;
                updateSmsButton();
                const timer = setInterval(() => {
                    smsCountdown--;
                    updateSmsButton();
                    if (smsCountdown <= 0) {
                        clearInterval(timer);
                    }
                }, 1000);

            } catch (error) {
                console.error('SMS send error:', error);
                showAlert(error.message, 'error');
                sendSmsBtn.textContent = originalText;
                sendSmsBtn.disabled = false;
            }
        });

        // 密码重置表单提交
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const smsCode = document.getElementById('smsCode').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 验证必填字段
            if (!phoneNumber || !smsCode || !newPassword || !confirmPassword) {
                showAlert('请填写所有必填项', 'error');
                return;
            }

            // 验证手机号格式
            const phonePattern = /^1[3-9]\d{9}$/;
            if (!phonePattern.test(phoneNumber)) {
                showAlert('请输入正确的11位手机号', 'error');
                document.getElementById('phoneNumber').focus();
                return;
            }

            // 验证短信验证码格式
            if (!/^\d{6}$/.test(smsCode)) {
                showAlert('验证码必须是6位数字', 'error');
                document.getElementById('smsCode').focus();
                return;
            }

            // 验证密码长度
            if (newPassword.length < 8) {
                showAlert('密码长度至少8位', 'error');
                document.getElementById('newPassword').focus();
                return;
            }

            // 验证密码格式（至少包含字母和数字）
            if (!/[a-zA-Z]/.test(newPassword) || !/\d/.test(newPassword)) {
                showAlert('密码必须包含字母和数字', 'error');
                document.getElementById('newPassword').focus();
                return;
            }

            // 验证密码一致性
            if (newPassword !== confirmPassword) {
                showAlert('两次输入的密码不一致', 'error');
                document.getElementById('confirmPassword').focus();
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone_number: phoneNumber,
                        sms_code: smsCode,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '密码重置失败');
                }

                showAlert('密码重置成功！正在跳转到登录页面...', 'success');

                // 3秒后跳转到登录页
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 3000);

            } catch (error) {
                console.error('Reset password error:', error);
                showAlert(error.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        // 实时验证确认密码
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = e.target.value;

            if (confirmPassword && newPassword !== confirmPassword) {
                e.target.style.borderColor = '#ef4444';
            } else if (confirmPassword) {
                e.target.style.borderColor = '#10b981';
            }
        });
    </script>
</body>

</html>
