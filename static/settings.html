<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人设置 - TikTok 达人推荐系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 24px;
        }

        .btn-back {
            padding: 10px 20px;
            background: #e5e7eb;
            color: #374151;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            background: #d1d5db;
        }

        .settings-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f3f4f6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .required {
            color: #ef4444;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input:disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .input-hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6b7280;
            user-select: none;
            font-size: 18px;
        }

        .password-toggle-icon:hover {
            color: #374151;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-text {
            display: inline-block;
        }

        .user-info {
            background: #f9fafb;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #6b7280;
            font-weight: 500;
        }

        .info-value {
            color: #111827;
            font-weight: 600;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: #e5e7eb;
            margin-bottom: 4px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .strength-weak .strength-fill {
            width: 33%;
            background: #ef4444;
        }

        .strength-medium .strength-fill {
            width: 66%;
            background: #f59e0b;
        }

        .strength-strong .strength-fill {
            width: 100%;
            background: #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ 个人设置</h1>
            <a href="/" class="btn-back">返回主页</a>
        </div>

        <!-- 用户信息卡片 -->
        <div class="settings-card">
            <div class="section-title">账户信息</div>
            <div class="user-info">
                <div class="info-row">
                    <span class="info-label">用户名</span>
                    <span class="info-value" id="displayUsername">加载中...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">手机号</span>
                    <span class="info-value" id="displayPhone">加载中...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">邮箱</span>
                    <span class="info-value" id="displayEmail">未设置</span>
                </div>
            </div>
        </div>

        <!-- 修改密码卡片 -->
        <div class="settings-card">
            <div class="section-title">修改密码</div>
            <div id="passwordAlert" class="alert"></div>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="oldPassword">当前密码 <span class="required">*</span></label>
                    <div class="password-toggle">
                        <input type="password" id="oldPassword" required placeholder="请输入当前密码">
                        <span class="password-toggle-icon" onclick="togglePassword('oldPassword')">👁️</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="newPassword">新密码 <span class="required">*</span></label>
                    <div class="password-toggle">
                        <input type="password" id="newPassword" required minlength="8" placeholder="至少8位，包含字母和数字">
                        <span class="password-toggle-icon" onclick="togglePassword('newPassword')">👁️</span>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill"></div>
                        </div>
                        <span id="strengthText" class="input-hint">请输入至少8位密码</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认新密码 <span class="required">*</span></label>
                    <div class="password-toggle">
                        <input type="password" id="confirmPassword" required minlength="8" placeholder="请再次输入新密码">
                        <span class="password-toggle-icon" onclick="togglePassword('confirmPassword')">👁️</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="passwordBtn">
                    <span class="btn-text">更新密码</span>
                    <div class="loading-spinner"></div>
                </button>
            </form>
        </div>

        <!-- 修改邮箱卡片 -->
        <div class="settings-card">
            <div class="section-title">修改邮箱</div>
            <div id="emailAlert" class="alert"></div>
            <form id="emailForm">
                <div class="form-group">
                    <label for="newEmail">新邮箱</label>
                    <input type="email" id="newEmail" placeholder="请输入新邮箱地址">
                    <div class="input-hint">留空表示不修改邮箱</div>
                </div>

                <button type="submit" class="btn-primary" id="emailBtn">
                    <span class="btn-text">更新邮箱</span>
                    <div class="loading-spinner"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8001';
        let accessToken = localStorage.getItem('access_token');

        // 检查登录状态
        if (!accessToken) {
            alert('请先登录');
            window.location.href = '/login.html';
        }

        // 密码显示/隐藏切换
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const icon = passwordInput.nextElementSibling;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                icon.textContent = '👁️';
            }
        }

        // 显示提示信息
        function showAlert(elementId, message, type = 'error') {
            const alertBox = document.getElementById(elementId);
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 3000);
            }
        }

        // 设置加载状态
        function setLoading(buttonId, isLoading) {
            const btn = document.getElementById(buttonId);
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.loading-spinner');

            if (isLoading) {
                btn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                btnText.style.display = 'inline-block';
                spinner.style.display = 'none';
            }
        }

        // 密码强度检测
        function checkPasswordStrength(password) {
            const strengthBar = document.querySelector('.password-strength');
            const strengthText = document.getElementById('strengthText');

            if (password.length < 8) {
                strengthBar.className = 'password-strength';
                strengthText.textContent = '密码长度至少8位';
                return 'weak';
            }

            let strength = 0;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;

            if (strength <= 1) {
                strengthBar.className = 'password-strength strength-weak';
                strengthText.textContent = '密码强度：弱';
                return 'weak';
            } else if (strength <= 2) {
                strengthBar.className = 'password-strength strength-medium';
                strengthText.textContent = '密码强度：中等';
                return 'medium';
            } else {
                strengthBar.className = 'password-strength strength-strong';
                strengthText.textContent = '密码强度：强';
                return 'strong';
            }
        }

        // 监听新密码输入
        document.getElementById('newPassword').addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });

        // 加载用户信息
        async function loadUserInfo() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.status === 401) {
                    alert('登录已过期，请重新登录');
                    localStorage.clear();
                    window.location.href = '/login.html';
                    return;
                }

                const data = await response.json();

                document.getElementById('displayUsername').textContent = data.username || '-';
                document.getElementById('displayPhone').textContent = data.phone_number || '-';
                document.getElementById('displayEmail').textContent = data.email || '未设置';

                // 预填邮箱
                if (data.email) {
                    document.getElementById('newEmail').value = data.email;
                }
            } catch (error) {
                console.error('Failed to load user info:', error);
            }
        }

        // 修改密码表单提交
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 验证必填字段
            if (!oldPassword || !newPassword || !confirmPassword) {
                showAlert('passwordAlert', '请填写所有必填项', 'error');
                return;
            }

            // 验证密码长度
            if (newPassword.length < 8) {
                showAlert('passwordAlert', '新密码长度至少8位', 'error');
                return;
            }

            // 验证密码格式
            if (!/[a-zA-Z]/.test(newPassword) || !/\d/.test(newPassword)) {
                showAlert('passwordAlert', '新密码必须包含字母和数字', 'error');
                return;
            }

            // 验证密码一致性
            if (newPassword !== confirmPassword) {
                showAlert('passwordAlert', '两次输入的新密码不一致', 'error');
                return;
            }

            // 验证新旧密码不同
            if (oldPassword === newPassword) {
                showAlert('passwordAlert', '新密码不能与当前密码相同', 'error');
                return;
            }

            setLoading('passwordBtn', true);

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/change-password`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '密码修改失败');
                }

                showAlert('passwordAlert', '密码修改成功！', 'success');

                // 清空表单
                document.getElementById('passwordForm').reset();
                document.querySelector('.password-strength').className = 'password-strength';
                document.getElementById('strengthText').textContent = '请输入至少8位密码';

            } catch (error) {
                console.error('Change password error:', error);
                showAlert('passwordAlert', error.message, 'error');
            } finally {
                setLoading('passwordBtn', false);
            }
        });

        // 修改邮箱表单提交
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newEmail = document.getElementById('newEmail').value.trim();

            if (!newEmail) {
                showAlert('emailAlert', '请输入新邮箱地址', 'error');
                return;
            }

            // 验证邮箱格式
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(newEmail)) {
                showAlert('emailAlert', '请输入有效的邮箱地址', 'error');
                return;
            }

            setLoading('emailBtn', true);

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/update-email`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        new_email: newEmail
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '邮箱修改失败');
                }

                showAlert('emailAlert', '邮箱修改成功！', 'success');

                // 更新显示
                document.getElementById('displayEmail').textContent = newEmail;

            } catch (error) {
                console.error('Update email error:', error);
                showAlert('emailAlert', error.message, 'error');
            } finally {
                setLoading('emailBtn', false);
            }
        });

        // 实时验证确认密码
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = e.target.value;

            if (confirmPassword && newPassword !== confirmPassword) {
                e.target.style.borderColor = '#ef4444';
            } else if (confirmPassword) {
                e.target.style.borderColor = '#10b981';
            }
        });

        // 页面加载时获取用户信息
        window.addEventListener('DOMContentLoaded', loadUserInfo);
    </script>
</body>
</html>
