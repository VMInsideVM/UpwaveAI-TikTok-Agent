<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - TikTok 达人推荐系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        label .required {
            color: #ef4444;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .password-requirements {
            font-size: 12px;
            color: #6b7280;
            margin-top: 8px;
            padding: 8px 12px;
            background: #f3f4f6;
            border-radius: 6px;
        }

        .password-requirements ul {
            margin: 4px 0 0 20px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .links {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-text {
            display: inline-block;
        }

        .invitation-code-input {
            position: relative;
        }

        .code-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>🤖 TikTok 达人推荐</h1>
            <p>创建新账户</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="invitationCode">邀请码 <span class="required">*</span></label>
                <div class="invitation-code-input">
                    <input type="text" id="invitationCode" name="invitationCode" required placeholder="请输入邀请码">
                    <span class="code-icon">🎫</span>
                </div>
                <div class="input-hint">请向管理员索取邀请码</div>
            </div>

            <div class="form-group">
                <label for="username">用户名 <span class="required">*</span></label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
                <div class="input-hint">3-50个字符</div>
            </div>

            <div class="form-group">
                <label for="email">邮箱 <span class="required">*</span></label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="example@domain.com">
            </div>

            <div class="form-group">
                <label for="password">密码 <span class="required">*</span></label>
                <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="请输入密码">
                <div class="password-requirements">
                    密码要求：
                    <ul>
                        <li>至少 8 个字符</li>
                        <li>必须包含字母</li>
                        <li>必须包含数字</li>
                    </ul>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码 <span class="required">*</span></label>
                <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" placeholder="请再次输入密码">
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <span class="btn-text">注册</span>
                <div class="loading-spinner"></div>
            </button>
        </form>

        <div class="links">
            <a href="/login.html">已有账号？立即登录</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8001';

        // 检查是否已登录
        if (localStorage.getItem('access_token')) {
            const isAdmin = localStorage.getItem('is_admin') === 'true';
            window.location.href = isAdmin ? '/admin.html' : '/';
        }

        // 显示提示信息
        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 3000);
            }
        }

        // 设置加载状态
        function setLoading(isLoading) {
            const btn = document.getElementById('registerBtn');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.loading-spinner');

            if (isLoading) {
                btn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                btnText.style.display = 'inline-block';
                spinner.style.display = 'none';
            }
        }

        // 验证密码强度
        function validatePassword(password) {
            if (password.length < 8) {
                return '密码至少需要 8 位字符';
            }
            if (!/[a-zA-Z]/.test(password)) {
                return '密码必须包含字母';
            }
            if (!/\d/.test(password)) {
                return '密码必须包含数字';
            }
            return null;
        }

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const invitationCode = document.getElementById('invitationCode').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 验证输入
            if (!invitationCode) {
                showAlert('请输入邀请码', 'error');
                return;
            }

            if (username.length < 3 || username.length > 50) {
                showAlert('用户名长度必须在 3-50 个字符之间', 'error');
                return;
            }

            const passwordError = validatePassword(password);
            if (passwordError) {
                showAlert(passwordError, 'error');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('两次输入的密码不一致', 'error');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        invitation_code: invitationCode,
                        username: username,
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '注册失败，请检查输入信息');
                }

                // 保存 token 和用户信息
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('is_admin', data.is_admin);

                showAlert('注册成功！正在跳转...', 'success');

                // 跳转到主页
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);

            } catch (error) {
                console.error('Registration error:', error);
                showAlert(error.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        // 实时验证密码
        document.getElementById('password').addEventListener('input', (e) => {
            const error = validatePassword(e.target.value);
            if (error && e.target.value.length > 0) {
                e.target.style.borderColor = '#f87171';
            } else {
                e.target.style.borderColor = e.target.value.length > 0 ? '#10b981' : '#e5e7eb';
            }
        });

        // 确认密码实时验证
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            const password = document.getElementById('password').value;
            if (e.target.value.length > 0) {
                if (e.target.value === password) {
                    e.target.style.borderColor = '#10b981';
                } else {
                    e.target.style.borderColor = '#f87171';
                }
            } else {
                e.target.style.borderColor = '#e5e7eb';
            }
        });
    </script>
</body>
</html>
