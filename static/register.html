<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.png" type="image/png">
    <title>注册 - TikTok 达人推荐系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        label .required {
            color: #ef4444;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .password-requirements {
            font-size: 12px;
            color: #6b7280;
            margin-top: 8px;
            padding: 8px 12px;
            background: #f3f4f6;
            border-radius: 6px;
        }

        .password-requirements ul {
            margin: 4px 0 0 20px;
        }

        .sms-code-group {
            display: flex;
            gap: 10px;
        }

        .sms-code-group input {
            flex: 1;
        }

        .btn-secondary {
            padding: 12px 20px;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-width: 120px;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .links {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-text {
            display: inline-block;
        }

        .invitation-code-input {
            position: relative;
        }

        .code-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #667eea;
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="logo">
            <h1>🤖 TikTok 达人推荐</h1>
            <p>创建新账户</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="registerForm">
            <!-- 手机号 (必填) -->
            <div class="form-group">
                <label for="phoneNumber">手机号 <span class="required">*</span></label>
                <input type="tel" id="phoneNumber" name="phoneNumber" required pattern="^1[3-9]\d{9}$"
                    placeholder="请输入11位手机号">
                <div class="input-hint">仅支持中国大陆手机号</div>
            </div>

            <!-- 短信验证码 (必填) -->
            <div class="form-group">
                <label for="smsCode">短信验证码 <span class="required">*</span></label>
                <div class="sms-code-group">
                    <input type="text" id="smsCode" name="smsCode" required pattern="\d{6}" placeholder="请输入6位验证码"
                        maxlength="6">
                    <button type="button" id="sendSmsBtn" class="btn-secondary">
                        获取验证码
                    </button>
                </div>
                <div class="input-hint">验证码5分钟内有效</div>
            </div>

            <!-- 用户名 (可选) -->
            <div class="form-group">
                <label for="username">用户名（可选）</label>
                <input type="text" id="username" name="username" autocomplete="username" placeholder="留空自动生成">
                <div class="input-hint">3-50个字符，留空则自动生成</div>
            </div>

            <!-- 邮箱 (可选) -->
            <div class="form-group">
                <label for="email">邮箱（可选）</label>
                <input type="email" id="email" name="email" autocomplete="email" placeholder="example@domain.com">
                <div class="input-hint">用于接收达人推荐报告生成提醒</div>
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label for="password">密码 <span class="required">*</span></label>
                <input type="password" id="password" name="password" required autocomplete="new-password"
                    placeholder="请输入密码">
                <div class="password-requirements">
                    密码要求：
                    <ul>
                        <li>至少 8 个字符</li>
                        <li>必须包含字母</li>
                        <li>必须包含数字</li>
                    </ul>
                </div>
            </div>

            <!-- 确认密码 -->
            <div class="form-group">
                <label for="confirmPassword">确认密码 <span class="required">*</span></label>
                <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password"
                    placeholder="请再次输入密码">
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <span class="btn-text">注册</span>
                <div class="loading-spinner"></div>
            </button>
        </form>

        <div class="links">
            <a href="#" onclick="event.preventDefault(); navigateTo('/login.html');">已有账号？立即登录</a>
        </div>
    </div>

    <script>
                // === 全局配置：自动检测部署路径 ===
        const BASE_PATH = (() => {
            const path = window.location.pathname;
            if (path.startsWith('/agent/')) return '/agent';
            return '';
        })();
        const API_BASE_URL = window.location.origin + BASE_PATH;
        const getFullPath = (p) => BASE_PATH + (p.startsWith('/') ? p : '/' + p);
        const navigateTo = (p) => window.location.href = getFullPath(p);
        // =========================================


        // 检查是否已登录
        if (localStorage.getItem('access_token')) {
            const isAdmin = localStorage.getItem('is_admin') === 'true';
            window.location.href = isAdmin ? '/admin.html' : '/';
        }

        // 显示提示信息
        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 3000);
            }
        }

        // 设置加载状态
        function setLoading(isLoading) {
            const btn = document.getElementById('registerBtn');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.loading-spinner');

            if (isLoading) {
                btn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                btnText.style.display = 'inline-block';
                spinner.style.display = 'none';
            }
        }

        // 验证密码强度
        function validatePassword(password) {
            if (password.length < 8) {
                return '密码至少需要 8 位字符';
            }
            if (!/[a-zA-Z]/.test(password)) {
                return '密码必须包含字母';
            }
            if (!/\d/.test(password)) {
                return '密码必须包含数字';
            }
            return null;
        }

        // 验证手机号格式
        function validatePhoneNumber(phone) {
            const phoneRegex = /^1[3-9]\d{9}$/;
            return phoneRegex.test(phone);
        }

        // 短信验证码倒计时
        let smsCountdown = 0;
        const sendSmsBtn = document.getElementById('sendSmsBtn');
        const phoneInput = document.getElementById('phoneNumber');

        function updateSmsButton() {
            if (smsCountdown > 0) {
                sendSmsBtn.textContent = `${smsCountdown}秒后重试`;
                sendSmsBtn.disabled = true;
            } else {
                sendSmsBtn.textContent = '获取验证码';
                sendSmsBtn.disabled = false;
            }
        }

        // 发送短信验证码
        sendSmsBtn.addEventListener('click', async function () {
            const phone = phoneInput.value.trim();

            // 验证手机号格式
            if (!validatePhoneNumber(phone)) {
                showAlert('请输入正确的11位中国大陆手机号', 'error');
                phoneInput.focus();
                return;
            }

            // 防止重复点击
            if (smsCountdown > 0) {
                return;
            }

            try {
                sendSmsBtn.disabled = true;

                const response = await fetch(`${API_BASE_URL}/api/auth/send-sms-code`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone_number: phone,
                        code_type: 'register'
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '发送失败');
                }

                showAlert(data.message, 'success');

                // 开始倒计时（60秒）
                smsCountdown = 60;
                updateSmsButton();

                const timer = setInterval(() => {
                    smsCountdown--;
                    updateSmsButton();

                    if (smsCountdown <= 0) {
                        clearInterval(timer);
                    }
                }, 1000);

            } catch (error) {
                console.error('SMS error:', error);
                showAlert(error.message, 'error');
                sendSmsBtn.disabled = false;
            }
        });

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const smsCode = document.getElementById('smsCode').value.trim();
            const username = document.getElementById('username').value.trim() || null;
            const email = document.getElementById('email').value.trim() || null;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 验证输入
            if (!validatePhoneNumber(phoneNumber)) {
                showAlert('请输入正确的11位手机号', 'error');
                return;
            }

            if (!smsCode || smsCode.length !== 6) {
                showAlert('请输入6位数字验证码', 'error');
                return;
            }

            if (username && (username.length < 3 || username.length > 50)) {
                showAlert('用户名长度必须在 3-50 个字符之间', 'error');
                return;
            }

            const passwordError = validatePassword(password);
            if (passwordError) {
                showAlert(passwordError, 'error');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('两次输入的密码不一致', 'error');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register-phone`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone_number: phoneNumber,
                        sms_code: smsCode,
                        username: username,
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '注册失败，请检查输入信息');
                }

                // 保存 token 和用户信息
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('is_admin', data.is_admin);

                showAlert('注册成功！正在跳转...', 'success');

                // 跳转到主页
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);

            } catch (error) {
                console.error('Registration error:', error);
                showAlert(error.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        // 实时验证手机号
        phoneInput.addEventListener('input', (e) => {
            const isValid = validatePhoneNumber(e.target.value);
            if (e.target.value.length > 0) {
                e.target.style.borderColor = isValid ? '#10b981' : '#f87171';
            } else {
                e.target.style.borderColor = '#e5e7eb';
            }
        });

        // 实时验证密码
        document.getElementById('password').addEventListener('input', (e) => {
            const error = validatePassword(e.target.value);
            if (error && e.target.value.length > 0) {
                e.target.style.borderColor = '#f87171';
            } else {
                e.target.style.borderColor = e.target.value.length > 0 ? '#10b981' : '#e5e7eb';
            }
        });

        // 确认密码实时验证
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            const password = document.getElementById('password').value;
            if (e.target.value.length > 0) {
                if (e.target.value === password) {
                    e.target.style.borderColor = '#10b981';
                } else {
                    e.target.style.borderColor = '#f87171';
                }
            } else {
                e.target.style.borderColor = '#e5e7eb';
            }
        });
    </script>
</body>

</html>
