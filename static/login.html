<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon will be set dynamically -->
    <title>登录 - TikTok 达人推荐系统</title>
    <!-- Google Fonts - Luxury Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* 🎨 Base / Background - Luxury Beige */
            --bg-main: #F3EFEA;
            --bg-card: #FAF7F2;
            --bg-subtle: #EFE9DF;

            /* 🥂 Gold / Champagne */
            --gold-strong: #C6B27E;
            --gold-soft: rgba(198, 178, 126, 0.35);

            /* 💎 Tiffany Blue */
            --tiffany: #81D8CF;
            --tiffany-hover: #72C9BE;
            --tiffany-active: #63BAAF;
            --tiffany-glow: rgba(129, 216, 207, 0.35);

            /* 🖋 Text Colors */
            --text-primary: #2B2B2B;
            --text-secondary: #6B6B6B;
            --text-muted: #9A9A9A;

            /* 🧩 Component Tokens */
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.08);
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Noto Serif SC', serif;

            --btn-primary-bg: var(--tiffany);
            /* Use Tiffany for primary actions */
            --btn-primary-text: #FAF7F2;
            /* Beige text on tiffany button */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .login-container {
            background: var(--bg-card);
            border: 1px solid var(--gold-soft);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: var(--text-primary);
            font-family: var(--font-serif);
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gold-soft);
            border-radius: var(--radius-md);
            font-size: 15px;
            transition: all 0.2s ease;
            background: #fff;
            color: var(--text-primary);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--tiffany);
            box-shadow: 0 0 0 3px var(--tiffany-glow);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--tiffany);
            color: var(--bg-card);
            /* Specific text color */
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px var(--tiffany-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            background: var(--tiffany-hover);
            box-shadow: 0 6px 16px var(--tiffany-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .links {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--gold-soft);
        }

        .links a {
            color: var(--tiffany-active);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .links a:hover {
            color: var(--tiffany-hover);
            text-decoration: underline;
        }

        .forgot-password {
            text-align: right;
            margin-top: 8px;
            margin-bottom: 16px;
        }

        .forgot-password a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password a:hover {
            color: var(--tiffany);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--bg-card);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-text {
            display: inline-block;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            user-select: none;
            font-size: 18px;
        }

        .password-toggle-icon:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <h1>
                <img src="/static/logo.png" alt="Logo" style="width: 40px; height: 40px; vertical-align: middle;">
                TikTok 达人推荐
            </h1>
            <p>登录您的账户</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="identifier">手机号 / 用户名</label>
                <input type="text" id="identifier" name="identifier" required autocomplete="username"
                    placeholder="请输入手机号或用户名">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <div class="password-toggle">
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        placeholder="请输入密码">
                    <span class="password-toggle-icon" onclick="togglePassword()">👁️</span>
                </div>
                <div class="forgot-password">
                    <a href="#" onclick="event.preventDefault(); navigateTo('/reset-password.html');">忘记密码？</a>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
                <span class="btn-text">登录</span>
                <div class="loading-spinner"></div>
            </button>
        </form>

        <div class="links">
            <a href="#" onclick="event.preventDefault(); navigateTo('/register.html');">还没有账号？立即注册</a>
        </div>
    </div>

    <script>
        // === 全局配置：自动检测部署路径 ===
        const BASE_PATH = (() => {
            const path = window.location.pathname;
            if (path.startsWith('/agent/')) return '/agent';
            return '';
        })();
        const API_BASE_URL = window.location.origin + BASE_PATH;
        const getFullPath = (p) => BASE_PATH + (p.startsWith('/') ? p : '/' + p);
        const navigateTo = (p) => window.location.href = getFullPath(p);

        // 动态设置 favicon
        const setFavicon = () => {
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/png';
            link.rel = 'icon';
            link.href = `${BASE_PATH}/static/logo.png`;
            document.getElementsByTagName('head')[0].appendChild(link);
        };
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setFavicon);
        } else {
            setFavicon();
        }
        // =========================================

        // 检查是否已登录
        if (localStorage.getItem('access_token')) {
            const isAdmin = localStorage.getItem('is_admin') === 'true';
            navigateTo(isAdmin ? '/admin.html' : '/');
        }

        // 密码显示/隐藏切换
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                icon.textContent = '👁️';
            }
        }

        // 显示提示信息
        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 3000);
            }
        }

        // 设置加载状态
        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.loading-spinner');

            if (isLoading) {
                btn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                btnText.style.display = 'inline-block';
                spinner.style.display = 'none';
            }
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;

            if (!identifier || !password) {
                showAlert('请输入手机号/用户名和密码', 'error');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login-phone`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ identifier, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '登录失败，请检查手机号/用户名和密码');
                }

                // 保存 token 和用户信息
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('is_admin', data.is_admin);

                showAlert('登录成功！正在跳转...', 'success');

                // 跳转到对应页面
                setTimeout(() => {
                    navigateTo(data.is_admin ? '/admin.html' : '/');
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showAlert(error.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        // Enter 键提交
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>

</html>
