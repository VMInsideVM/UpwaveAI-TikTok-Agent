<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查看分享报告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .access-container {
            max-width: 450px;
            width: 90%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .report-info {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }

        .owner-info {
            color: #999;
            font-size: 13px;
            margin-top: 8px;
        }

        .password-form {
            margin-top: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .expired-badge {
            display: inline-block;
            background: #fee;
            color: #c33;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        .watermark {
            position: fixed;
            bottom: 20px;
            right: 20px;
            opacity: 0.5;
            font-size: 12px;
            color: #999;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="access-container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            加载中...
        </div>

        <div id="content" style="display: none;">
            <h2 id="reportTitle"></h2>
            <div class="report-info">
                <div id="reportInfo"></div>
                <div class="owner-info" id="ownerInfo"></div>
            </div>

            <div id="passwordForm" class="password-form" style="display: none;">
                <div class="form-group">
                    <label for="accessPassword">访问密码</label>
                    <input type="password" id="accessPassword" placeholder="请输入访问密码" />
                </div>
                <button class="btn" onclick="accessReport()">访问报告</button>
            </div>

            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <div class="watermark" id="watermark"></div>

    <script>
        // 从 URL 中提取 report_id 和 base_path
        const pathParts = window.location.pathname.split('/');
        const reportId = pathParts[pathParts.length - 1];

        // 检测 BASE_PATH (如果路径包含 /agent/shared/，则 BASE_PATH 是 /agent)
        let BASE_PATH = '';
        const sharedIndex = pathParts.indexOf('shared');
        if (sharedIndex > 1) {
            BASE_PATH = pathParts.slice(1, sharedIndex).join('/');
            if (BASE_PATH) {
                BASE_PATH = '/' + BASE_PATH;
            }
        }

        async function loadPreview() {
            try {
                const response = await fetch(`${BASE_PATH}/api/reports/${reportId}/shared/preview`);
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                if (data.success) {
                    document.getElementById('reportTitle').textContent = data.title;

                    const createdDate = new Date(data.created_at).toLocaleString('zh-CN');
                    document.getElementById('reportInfo').textContent = `创建于: ${createdDate}`;

                    document.getElementById('ownerInfo').textContent = `报告所有者: ${data.owner_username}`;
                    document.getElementById('watermark').textContent = `报告所有者: ${data.owner_username}`;

                    if (data.is_expired) {
                        showError('分享链接已过期');
                    } else if (data.share_mode === 'private') {
                        showError('此报告未分享');
                    } else if (data.share_mode === 'public') {
                        // 公开模式，直接访问
                        accessReport();
                    } else if (data.requires_password) {
                        document.getElementById('passwordForm').style.display = 'block';
                        document.getElementById('accessPassword').focus();
                    }
                } else {
                    showError(data.message || '加载失败');
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showError('网络错误，请稍后重试');
            }
        }

        async function accessReport() {
            const password = document.getElementById('accessPassword')?.value;
            const button = document.querySelector('.btn');

            if (button) {
                button.disabled = true;
                button.textContent = '验证中...';
            }

            try {
                const response = await fetch(`${BASE_PATH}/api/reports/${reportId}/shared`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password || null })
                });

                const data = await response.json();

                if (data.success) {
                    // 访问成功，跳转到报告
                    window.location.href = data.report_url;
                } else {
                    showError(data.detail || '访问失败');
                    if (button) {
                        button.disabled = false;
                        button.textContent = '访问报告';
                    }
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                if (button) {
                    button.disabled = false;
                    button.textContent = '访问报告';
                }
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');

            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 3000);
        }

        // 监听回车键
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('passwordForm').style.display !== 'none') {
                accessReport();
            }
        });

        // 页面加载时执行
        loadPreview();
    </script>
</body>

</html>
